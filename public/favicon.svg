<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="35%" stop-color="#F4E8C1" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="65%" stop-color="#F4E8C1" />
      <stop offset="100%" stop-color="#A67C1E" />
    </linearGradient>
    
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1f" />
      <stop offset="50%" stop-color="#0f0f11" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="36" fill="url(#bgGradient)" stroke="url(#goldGradient)" stroke-width="3" />
  
  <!-- Subtle inner border -->
  <rect x="4" y="4" width="120" height="120" rx="32" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.3" />
  
  <!-- Omega Logo with Glow -->
  <text 
    x="64" 
    y="96" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="94" 
    font-weight="bold" 
    fill="url(#goldGradient)" 
    text-anchor="middle" 
    filter="url(#glow)"
  >
    Ω
  </text>
</svg>